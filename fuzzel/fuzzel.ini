[main]
font=JetBrainsMono NF SemiBold:size=13
use-bold=yes
dpi-aware=no
fields=name,generic,comment,categories,filename,keywords,exec
terminal=alacritty
prompt="=> "
placeholder="Search and launch"
icon-theme=Papirus
icons-enabled=yes
show-actions=no
anchor=center
x-margin=10
y-margin=10
lines=9
width=40
horizontal-pad=20
vertical-pad=15
inner-pad=5
line-height=20
letter-spacing=0
image-size-ratio=0.2
layer=top
exit-on-keyboard-focus-loss = yes

[colors]
background=1e1e2eff
prompt=cba6f7ff
input=cdd6f4ff
text=cdd6f4ff
match=f38ba8ff
selection=313244ff
selection-text=cdd6f4ff
border=b4befecc

[border]
width=2
radius=0

