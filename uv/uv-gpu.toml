[project]
name = "bank"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    # ===== 核心 =====
    "numpy",
    # ===== 数据处理 =====
    "pandas",
    "scipy",
    "scikit-learn",
    "statsmodels",
    "numba",
    "joblib",
    # ===== 可视化 =====
    "matplotlib",
    "seaborn",
    "plotly",
    # ===== 图像 =====
    "opencv-python",
    "pillow",
    # ===== 数学 =====
    "sympy",
    # ===== 通用工具 =====
    "tqdm",
    "requests>=2.31",
    "beautifulsoup4",
    "lxml",
    "pyyaml",
    "networkx",
    "pdfplumber>=0.11.9",
    "pypdf>=6.10.2",
    # ===== NLP =====
    "jieba",
    # ===== 深度学习 =====
    "tensorflow",
    "torch",
    "torchvision",
    "torchaudio",
    "torchinfo",
    "transformers>=4.46",
    "accelerate",
    # ===== LangChain =====
    "langchain>=1.2.17",
    "langchain-classic",
    "langchain-community>=0.4.1",
    "langchain-openai>=1.2.1",
    "langchain-google-genai>=4.2.2",
    "langchain-huggingface",
    "langchain-text-splitters",
    # ===== 模型 / 嵌入 / 向量 =====
    "openai>=2.32.0",
    "modelscope>=1.36.1",
    "sentence-transformers",
    "datasets",
    "faiss-cpu>=1.13.2",
    "flagembedding",
    # ===== Web =====
    "streamlit>=1.57.0",
    "flask>=3.1.3",
    # ===== Jupyter =====
    "jupyterlab",
    "notebook",
    "ipykernel",
    "ipython",
    "ipywidgets",
    "jupyterlab-language-pack-zh-cn",
    # ===== 开发 =====
    "pytest",
    "flake8",
    "black",
    "nbformat>=5.10.4",
    "nbconvert>=7.17.1",
]

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
py-modules = []

[[tool.uv.index]]
name = "pypi"
url = "https://pypi.org/simple"

[[tool.uv.index]]
name = "pytorch-cu121"
url = "https://download.pytorch.org/whl/cu121"
explicit = true

[tool.uv.sources]
torch      = { index = "pytorch-cu121" }
torchvision = { index = "pytorch-cu121" }
torchaudio  = { index = "pytorch-cu121" }

[tool.uv]
environments = [
    "sys_platform == 'linux' and platform_machine == 'x86_64'",
    "sys_platform == 'win32'",
]
