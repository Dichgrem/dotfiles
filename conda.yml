name: bank
channels:
  - pytorch
  - conda-forge
  - defaults

dependencies:
  - python=3.12

  # ===== 核心 =====
  - numpy

  # ===== 数据 =====
  - pandas
  - scipy
  - scikit-learn
  - statsmodels
  - numba
  - joblib

  # ===== 可视化 =====
  - matplotlib
  - seaborn
  - plotly

  # ===== 工具 =====
  - tqdm
  - requests>=2.31
  - beautifulsoup4
  - lxml
  - pyyaml
  - networkx

  # ===== NLP =====
  - conda-forge::jieba

  # ===== 图像 =====
  - opencv
  - pillow

  # ===== 数学 =====
  - sympy

  # ===== Jupyter =====
  - jupyterlab
  - notebook
  - ipykernel
  - ipython
  - ipywidgets

  # ===== 深度学习：CPU 版 torch =====
  - pytorch::pytorch
  - pytorch::torchvision
  - pytorch::torchaudio
  - cpuonly

  # ===== pip 安装 =====
  - pip
  - pip:
    - tensorflow-cpu
    - torchinfo
    - transformers<4.40
    - sentence-transformers
    - flagembedding
    - datasets
    - flake8
    - black
    - pytest
    - jupyterlab-language-pack-zh-cn
