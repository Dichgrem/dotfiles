services:
  searxng:
    image: searxng/searxng
    container_name: searxng
    restart: unless-stopped
    ulimits:
      nproc: 65535
      nofile:
        soft: 65535
        hard: 65535
    volumes:
      - /var/lib/docker/volumes/searxng/_data:/etc/searxng
    networks:
      - caddy
    expose:
      - "8080"

networks:
  caddy:
    external: true
