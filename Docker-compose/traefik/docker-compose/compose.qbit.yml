services:
  qbit:
    image: linuxserver/qbittorrent:latest
    container_name: qbit
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - UMASK_SET=022
      - TZ=Europe/London
      - WEBUI_PORT=8080
      - DOCKER_MODS=ghcr.io/vuetorrent/vuetorrent-lsio-mod:latest ## WebUI_Setting: /vuetorrent
    volumes:
      - ./docker/config:/config
      - ./docker/downloads:/downloads
    networks:
      - websecure
    labels:
      - traefik.enable=true
      - traefik.docker.network=websecure
      - traefik.http.routers.qbit.rule=Host(`xxx.xxx.com`)
      - traefik.http.routers.qbit.entrypoints=websecure
      - traefik.http.routers.qbit.tls=true
      - traefik.http.routers.qbit.tls.certresolver=static
      - traefik.http.routers.qbit.tls.domains[0].main=xxx.xxx.com
      - traefik.http.routers.qbit.tls.options=default
      - traefik.http.services.qbit.loadbalancer.server.port=8080
    ports:
      - '8083:8080'
      - '6881:6881'
      - '6881:6881/udp'
networks:
  websecure:
    external: true
