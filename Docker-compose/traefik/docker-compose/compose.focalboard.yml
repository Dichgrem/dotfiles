services:
  focalboard:
    image: mattermost/focalboard:latest
    container_name: focalboard
    restart: unless-stopped
    volumes:
      - focalboard-data:/opt/focalboard/data
    networks:
      - websecure
    labels:
      - traefik.enable=true
      - traefik.docker.network=websecure
      - traefik.http.routers.focalboard.rule=Host(`xxx.xxx.com`)
      - traefik.http.routers.focalboard.entrypoints=websecure
      - traefik.http.routers.focalboard.tls=true
      - traefik.http.routers.focalboard.tls.domains[0].main=xxx.xxx.com
      - traefik.http.routers.focalboard.tls.domains[0].sans=www.xxx.xxx.com
      - traefik.http.routers.focalboard.tls.options=default
      - traefik.http.services.focalboard.loadbalancer.server.port=8000
networks:
  websecure:
    external: true
volumes:
  focalboard-data:
    external: true
