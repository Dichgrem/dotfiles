[project]
name = "bank"
version = "0.1.0"
requires-python = ">=3.10"
dependencies = [
    # ===== 核心 =====
    "numpy",
    # ===== 数据 =====
    "pandas",
    "scipy",
    "scikit-learn",
    "statsmodels",
    "numba",
    "joblib",
    # ===== 可视化 =====
    "matplotlib",
    "seaborn",
    "plotly",
    # ===== 工具 =====
    "tqdm",
    "requests>=2.31",
    "beautifulsoup4",
    "lxml",
    "pyyaml",
    "networkx",
    # ===== NLP =====
    "jieba",
    # ===== 图像 =====
    "opencv-python",
    "pillow",
    # ===== 数学 =====
    "sympy",
    # ===== Jupyter =====
    "jupyterlab",
    "notebook",
    "ipykernel",
    "ipython",
    "ipywidgets",
    "jupyterlab-language-pack-zh-cn",
    # ===== 深度学习 =====
    "tensorflow-cpu",
    "torch",
    "torchvision",
    "torchaudio",
    "torchinfo",
    "transformers<4.40",
    "sentence-transformers",
    # ===== embedding =====
    "flagembedding",
    "datasets",
    # ===== 开发 =====
    "pytest",
    "flake8",
    "black",
    "flask>=3.1.3",
    "nbformat>=5.10.4",
    "nbconvert>=7.17.1",
    "openai>=2.32.0",
    "modelscope>=1.36.1",
]

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
py-modules = []

[[tool.uv.index]]
name = "pypi"
url = "https://pypi.org/simple"

[[tool.uv.index]]
name = "pytorch-cpu"
url = "https://download.pytorch.org/whl/cpu"
explicit = true

[tool.uv.sources]
torch      = { index = "pytorch-cpu" }
torchvision = { index = "pytorch-cpu" }
torchaudio  = { index = "pytorch-cpu" }

[tool.uv]
environments = [
    "sys_platform == 'linux' and platform_machine == 'x86_64'",
    "sys_platform == 'darwin'",
    "sys_platform == 'win32'",
]
